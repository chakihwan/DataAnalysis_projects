services:
  dev:
    build: .
    image: dataanalysis-dev
    container_name: dataanalysis-dev
    volumes:
      - .:/DataAnalysis_projects
    working_dir: /DataAnalysis_projects
    command: sleep infinity
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
